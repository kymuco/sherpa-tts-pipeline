prepare:
  mode: normalize-only
  loudness:
    target_lufs: -18.0
    loudness_range: 7.0
    true_peak: -1.5
  audio:
    sample_rate: null
    mono: null
    codec: pcm_s24le
  output:
    overwrite: false

dataset:
  language: ru
  whisper:
    model: large-v3
    device: auto
    compute_type: auto
    beam_size: 8
    best_of: 8
    condition_on_previous_text: false
    no_vad: false
    vad_min_silence_ms: 420
    vad_speech_pad_ms: 320
  audio:
    sample_rate: 22050
    min_duration: 1.5
    max_duration: 13.5
    start_pad: 0.22
    end_pad: 0.55
    merge_gap: 0.45
    split_gap: 0.60
  output:
    allow_duplicates: false
  quality:
    min_words: 1
    min_avg_logprob: -0.90
    max_no_speech_prob: 0.78
    min_word_prob: 0.55

export:
  piper_src: external/piper1-gpl/src
  tokens: null
  espeak_data_dir: null
  opset_version: 15

speak:
  provider: cpu
  num_threads: 4
  sid: 0
  speed: 1.0
  output: outputs/tts.wav
